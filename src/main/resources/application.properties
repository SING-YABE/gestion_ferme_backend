spring.application.name=gestion_ferme
server.port=8080
## Mariadb  Database configuration
#spring.profiles.active=dev
#spring.datasource.url=jdbc:mysql://localhost:8889/ferme_bd2
spring.datasource.url=jdbc:mariadb://localhost:3306/ferm_bd
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.jpa.properties.hibernate.type.UUIDCharType=org.hibernate.type.UUIDCharType
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
app.upload.logo-dir=/Users/patrick/uploads/logos
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB



