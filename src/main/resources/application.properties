spring.application.name=gestion_ferme
server.port=${PORT:8080}

# En production (Render), DATABASE_URL est injectée automatiquement
# En local, on utilise la DB locale par défaut
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/snackboost_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.type.UUIDCharType=org.hibernate.type.UUIDCharType

# En production : /app/uploads (dans le container Docker)
# En local      : /Users/patrick/uploads
app.upload.logo-dir=${UPLOAD_DIR:/app/uploads}/logos
app.upload.animaux-dir=${UPLOAD_DIR:/app/uploads}/animaux
app.upload.taches-dir=${UPLOAD_DIR:/app/uploads}/taches
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
