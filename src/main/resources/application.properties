spring.application.name=gestion_ferme
server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5432/snackboost_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.type.UUIDCharType=org.hibernate.type.UUIDCharType

app.upload.logo-dir=/Users/patrick/uploads/logos
app.upload.animaux-dir=/Users/patrick/uploads/animaux
app.upload.taches-dir=/Users/patrick/uploads/taches
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB