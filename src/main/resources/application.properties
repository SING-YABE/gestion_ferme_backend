spring.application.name=gestion_ferme
server.port=${PORT:8080}

# En production (Render), DATABASE_URL est injectée automatiquement
# En local, on utilise la DB locale par défaut
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:snackboost_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.show-sql=false
# ddl-auto=none : les schémas et tables sont créés par SchemaCreationService (EMF temporaire).
# Hibernate principal ne touche pas aux DDL au démarrage.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# CRITIQUE multi-tenant : OSIV doit ętre désactivé.
# Avec open-in-view=true (défaut), Spring ouvre un EntityManager au début de chaque
# requęte HTTP AVANT que TenantContext soit défini -> search_path = public pour toute la requęte.
# Avec false, chaque appel JPA crée son propre EntityManager avec le bon TenantContext.
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.type.UUIDCharType=org.hibernate.type.UUIDCharType

# En production : /app/uploads (dans le container Docker)
# En local      : /Users/patrick/uploads
app.upload.logo-dir=${UPLOAD_DIR:/app/uploads}/logos
app.upload.animaux-dir=${UPLOAD_DIR:/app/uploads}/animaux
app.upload.taches-dir=${UPLOAD_DIR:/app/uploads}/taches
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ----- Email (Spring Mail) -----------------------------------------------
# En production : définir MAIL_HOST, MAIL_PORT, MAIL_USER, MAIL_PASS dans Render
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USER:noreply@ferme.bf}
spring.mail.password=${MAIL_PASS:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# URL du frontend Angular -> pour construire le lien d'invitation dans l'email
app.frontend.url=${FRONTEND_URL:http://localhost:4200}

