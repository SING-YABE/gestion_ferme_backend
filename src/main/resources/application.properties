spring.application.name=gestion_ferme
server.port=${PORT:8080}

# En production (Render), DATABASE_URL est injectï¿½e automatiquement
# En local, on utilise la DB locale par dï¿½faut
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:snackboost_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.show-sql=false
# ddl-auto=none : les schï¿½mas et tables sont crï¿½ï¿½s par SchemaCreationService (EMF temporaire).
# Hibernate principal ne touche pas aux DDL au dï¿½marrage.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# CRITIQUE multi-tenant : OSIV doit ï¿½tre dï¿½sactivï¿½.
# Avec open-in-view=true (dï¿½faut), Spring ouvre un EntityManager au dï¿½but de chaque
# requï¿½te HTTP AVANT que TenantContext soit dï¿½fini -> search_path = public pour toute la requï¿½te.
# Avec false, chaque appel JPA crï¿½e son propre EntityManager avec le bon TenantContext.
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.type.UUIDCharType=org.hibernate.type.UUIDCharType

# En production : /app/uploads (dans le container Docker)
# En local      : /Users/patrick/uploads
app.upload.logo-dir=${UPLOAD_DIR:/app/uploads}/logos
app.upload.animaux-dir=${UPLOAD_DIR:/app/uploads}/animaux
app.upload.taches-dir=${UPLOAD_DIR:/app/uploads}/taches
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ----- Email (Spring Mail) -----------------------------------------------
# En production : dï¿½finir MAIL_HOST, MAIL_PORT, MAIL_USER, MAIL_PASS dans Render
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USER:noreply@ferme.bf}
spring.mail.password=${MAIL_PASS:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# URL du frontend Angular -> pour construire le lien d'invitation dans l'email
app.frontend.url=${FRONTEND_URL:http://localhost:4200}

#  code4hope API (Orange Money / SMS)

codehope.api.key=${CODEHOPE_API_KEY}
codehope.api.url=${CODEHOPE_API_URL:https://api-sms.c0de4hope.com}
codehope.payment.number=${CODEHOPE_PAYMENT_NUMBER}